<!DOCTYPE html>
<html lang="en">
<head>
   <link  rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <title>Document</title>
  <style>
    body{
      background-color: hsl(0, 0%, 7%);
      font-family:'Figtree', sans-serif;
      margin: 0px;
    }
    .back-end{
      background-color:  hsl(47, 88%, 63%);
      width:100%;
      height:100vh;
      display:flex;
      justify-content: center;
      align-items:center;
      margin:100px 0px;

    }
    .inside-end{
     background-color: white;
     width:200px;
     border:2px black solid;
     border-radius: 10px;   
     box-shadow: 5px 5px  black; 
    }
    .card-picture{
      width:180px;
      margin:10px;
      border-radius: 10px;
      
    }
    button{
      background-color:hsl(47, 88%, 63%);
      border:none;
      margin-left:10px;
      font-weight: bold;
      padding:5px 10px;
    }
    .date{
      font-size: 12px;
      margin-left:10px;

    }
    .heading{
      color:black;
      font-weight: bold;
      padding-left:10px;
      font-size:14px;
      cursor: pointer;
    }
    .heading:hover{
     color: hsl(47, 88%, 63%);
    }
    .content{
      margin-left:10px;
      font-size:9px;
      line-height: 15px;
      color: hsl(0, 0%, 42%)
    }
    .below-content{
      display:flex;
    }
    .profile-picture{
      width:30px;
      margin:10px;
      
    }
    .name{
      font-size:11px;
      font-weight: bold;
      margin-top:20px;

    }
  </style>
</head>
<body>
  <div class="back-end">
    <div class="inside-end">
      <img class="card-picture" src="illustration-article.svg">
      
      <button>Learning</button>
      <p class="date">Published 21 Dec 2023</p>
      <p class="heading">HTML & CSS foundations</p>
      <P class="content">These languages are the backbone of every website, defining structure, content, and presentation.</P>
      <div class="below-content"><img class="profile-picture" src="image-avatar.webp">
      <p class="name">Greg Hopper</p></div>
      
    </div>
  </div>

</body>
</html>
